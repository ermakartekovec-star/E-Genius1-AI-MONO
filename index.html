<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📁 Тест Google Drive: файлы и папки</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f, #1a0b2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(12, 20, 35, 0.95);
            border: 3px solid #00ffff;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px #00ffff;
            backdrop-filter: blur(10px);
            color: white;
        }

        h1 {
            text-align: center;
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffff;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: linear-gradient(145deg, #00cc88, #00aa66);
            border: 2px solid gold;
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ffff;
        }

        .btn.danger {
            background: linear-gradient(145deg, #ff5555, #cc0000);
        }

        .btn.small {
            padding: 6px 12px;
            font-size: 14px;
        }

        #loginContainer {
            text-align: center;
            padding: 40px;
        }

        #userInfo {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .folder-path {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
            font-family: monospace;
            color: #ff66b2;
        }

        .file-list {
            list-style: none;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #00ffff;
            border-radius: 15px;
            padding: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .file-item:hover {
            background: rgba(0, 255, 255, 0.1);
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-actions button {
            margin-left: 5px;
        }

        .status {
            margin: 15px 0;
            padding: 12px;
            border-radius: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: white;
        }

        .status.success { border-color: #00ff00; color: #00ff00; }
        .status.error { border-color: #ff5555; color: #ff5555; }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ffff;
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            border-color: #ff66b2;
            box-shadow: 0 0 20px #ff66b2;
            outline: none;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 Google Drive File Manager</h1>

        <!-- Кнопка входа -->
        <div id="loginContainer">
            <div id="g_id_onload"
                 data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-theme="filled_blue"
                 data-size="large"
                 data-text="sign_in_with">
            </div>
        </div>

        <!-- Основной интерфейс (после входа) -->
        <div id="mainContent" class="hidden">
            <div id="userInfo">
                <span>👤 <span id="userEmail"></span></span>
                <button class="btn small" onclick="logout()">🚪 Выйти</button>
            </div>

            <div class="folder-path" id="folderPath"></div>

            <div id="status" class="status">✅ Готов к работе</div>

            <h3>📂 Управление папкой</h3>
            <button class="btn" onclick="getOrCreateFolder()">📁 Создать/получить папку</button>

            <h3>📄 Создать новый файл</h3>
            <input type="text" id="newFileName" placeholder="Имя файла (необязательно)">
            <button class="btn" onclick="createFile()">➕ Создать файл</button>

            <h3>📋 Список файлов</h3>
            <button class="btn small" onclick="listFiles()">🔄 Обновить список</button>
            <div id="fileList" class="file-list"></div>

            <h3>✏️ Редактор файла</h3>
            <select id="fileSelector">
                <option value="">-- Выберите файл --</option>
            </select>
            <textarea id="fileContent" placeholder="Содержимое файла"></textarea>
            <button class="btn" onclick="readFile()">📖 Прочитать</button>
            <button class="btn" onclick="saveFile()">💾 Сохранить</button>
            <button class="btn danger" onclick="deleteFile()">🗑️ Удалить выбранный файл</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEiUZbhVQwrDu88J0cknXiZ55kgHV7jzabNNyHwePj4NUfpe52OaQ2WB8zFNA-3sx1/exec';
        let currentUser = null;
        let currentFiles = [];

        // ===========================================
        // ВХОД ЧЕРЕЗ GOOGLE
        // ===========================================
        function handleCredentialResponse(response) {
            const userInfo = parseJwt(response.credential);
            currentUser = userInfo;
            
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userEmail').textContent = userInfo.email;
            document.getElementById('folderPath').textContent = `📁 Папка: ${userInfo.email}`;
            
            showStatus('✅ Вход выполнен успешно!', 'success');
            getOrCreateFolder();
        }

        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error('Ошибка парсинга JWT', e);
                return null;
            }
        }

        function logout() {
            if (google && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }
            currentUser = null;
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        // ===========================================
        // РАБОТА С GOOGLE DRIVE ЧЕРЕЗ APPS SCRIPT
        // ===========================================
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status';
            if (type === 'success') status.classList.add('success');
            if (type === 'error') status.classList.add('error');
        }

        async function getOrCreateFolder() {
            if (!currentUser) return;
            
            showStatus('⏳ Создание/получение папки...');
            
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + encodeURIComponent(currentUser.email));
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Папка готова!', 'success');
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка соединения: ' + error.message, 'error');
            }
        }

        async function listFiles() {
            if (!currentUser) return;
            
            showStatus('⏳ Загрузка списка файлов...');
            
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + encodeURIComponent(currentUser.email) + '&action=listChats');
                const data = await response.json();
                
                if (data.success) {
                    currentFiles = data.chats || [];
                    displayFiles(currentFiles);
                    showStatus(`✅ Найдено файлов: ${currentFiles.length}`, 'success');
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка соединения: ' + error.message, 'error');
            }
        }

        function displayFiles(files) {
            const fileList = document.getElementById('fileList');
            const selector = document.getElementById('fileSelector');
            
            fileList.innerHTML = '';
            selector.innerHTML = '<option value="">-- Выберите файл --</option>';
            
            if (files.length === 0) {
                fileList.innerHTML = '<div style="text-align:center; padding:20px;">📂 Файлов пока нет</div>';
                return;
            }
            
            files.forEach(file => {
                // Добавляем в список
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-name">
                        📄 ${file.name}
                        <small style="color:#888;">${new Date(file.lastModified).toLocaleString()}</small>
                    </div>
                    <div class="file-actions">
                        <button class="btn small" onclick="selectFile('${file.id}', '${file.name}')">📝</button>
                    </div>
                `;
                fileList.appendChild(item);
                
                // Добавляем в выпадающий список
                const option = document.createElement('option');
                option.value = file.id;
                option.textContent = file.name;
                selector.appendChild(option);
            });
        }

        function selectFile(fileId, fileName) {
            const selector = document.getElementById('fileSelector');
            for (let i = 0; i < selector.options.length; i++) {
                if (selector.options[i].value === fileId) {
                    selector.selectedIndex = i;
                    break;
                }
            }
            readFile();
        }

        async function createFile() {
            if (!currentUser) return;
            
            const fileName = document.getElementById('newFileName').value.trim();
            
            showStatus('⏳ Создание файла...');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'createChat',
                        chatName: fileName || null
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showStatus(`✅ Файл создан: ${data.fileName}`, 'success');
                    document.getElementById('newFileName').value = '';
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка соединения: ' + error.message, 'error');
            }
        }

        async function readFile() {
            const fileId = document.getElementById('fileSelector').value;
            if (!fileId) {
                showStatus('❌ Выберите файл', 'error');
                return;
            }
            
            showStatus('⏳ Чтение файла...');
            
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + encodeURIComponent(currentUser.email) + '&action=getChat&fileId=' + fileId);
                const content = await response.text();
                
                document.getElementById('fileContent').value = content;
                showStatus('✅ Файл прочитан', 'success');
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }

        async function saveFile() {
            const fileId = document.getElementById('fileSelector').value;
            const content = document.getElementById('fileContent').value;
            
            if (!fileId) {
                showStatus('❌ Выберите файл', 'error');
                return;
            }
            
            showStatus('⏳ Сохранение...');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'saveChat',
                        fileId: fileId,
                        content: content
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Файл сохранён', 'success');
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }

        async function deleteFile() {
            const fileId = document.getElementById('fileSelector').value;
            if (!fileId) {
                showStatus('❌ Выберите файл', 'error');
                return;
            }
            
            if (!confirm('🗑️ Точно удалить файл?')) return;
            
            showStatus('⏳ Удаление...');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'deleteChat',
                        fileId: fileId
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Файл удалён', 'success');
                    document.getElementById('fileSelector').value = '';
                    document.getElementById('fileContent').value = '';
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
