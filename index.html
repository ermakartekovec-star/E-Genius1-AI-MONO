<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Неоновые градиенты ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0a0a0f;
            animation: bgPulse 10s infinite alternate;
        }

        @keyframes bgPulse {
            0% { background: #0a0a0f; }
            25% { background: #1a0b2e; }
            50% { background: #0a1a2a; }
            75% { background: #2a0f1f; }
            100% { background: #0a0a0f; }
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 40px;
            border-radius: 60px;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(15px);
            border: 3px solid transparent;
            animation: borderGlow 6s infinite linear;
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.3);
        }

        @keyframes borderGlow {
            0% { border-color: #00ffff; box-shadow: 0 0 50px #00ffff; }
            20% { border-color: #ff66b2; box-shadow: 0 0 60px #ff66b2; }
            40% { border-color: #b266ff; box-shadow: 0 0 70px #b266ff; }
            60% { border-color: #66cc66; box-shadow: 0 0 60px #66cc66; }
            80% { border-color: #ff9933; box-shadow: 0 0 50px #ff9933; }
            100% { border-color: #00ffff; box-shadow: 0 0 50px #00ffff; }
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00ffff, #ff66b2, #b266ff, #66cc66, #ff9933, #00ffff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientMove 10s infinite;
            text-shadow: 0 0 40px rgba(0,255,255,0.5);
            letter-spacing: 4px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 40px 0;
        }

        .gradient-card {
            aspect-ratio: 1;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .gradient-card:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 0 50px currentColor;
        }

        .gradient-card span {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Градиенты для карточек */
        .g1 { background: linear-gradient(135deg, #00ffff, #0066ff); color: white; box-shadow: 0 0 30px #00ffff; }
        .g2 { background: linear-gradient(135deg, #ff66b2, #ff0066); color: white; box-shadow: 0 0 30px #ff66b2; }
        .g3 { background: linear-gradient(135deg, #b266ff, #6600ff); color: white; box-shadow: 0 0 30px #b266ff; }
        .g4 { background: linear-gradient(135deg, #66cc66, #00aa00); color: white; box-shadow: 0 0 30px #66cc66; }
        .g5 { background: linear-gradient(135deg, #ff9933, #ff5500); color: white; box-shadow: 0 0 30px #ff9933; }
        .g6 { background: linear-gradient(135deg, #ff4444, #aa0000); color: white; box-shadow: 0 0 30px #ff4444; }
        .g7 { background: linear-gradient(135deg, #ff00ff, #9900ff); color: white; box-shadow: 0 0 30px #ff00ff; }
        .g8 { background: linear-gradient(135deg, #00ffaa, #00aa66); color: white; box-shadow: 0 0 30px #00ffaa; }
        .g9 { background: linear-gradient(135deg, #ffaa00, #ff6600); color: white; box-shadow: 0 0 30px #ffaa00; }

        .gradient-row {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gradient-block {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            animation: float 3s infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }

        .gradient-block:nth-child(1) { background: radial-gradient(circle at 30% 30%, #00ffff, #0066ff); }
        .gradient-block:nth-child(2) { background: radial-gradient(circle at 70% 30%, #ff66b2, #ff0066); }
        .gradient-block:nth-child(3) { background: radial-gradient(circle at 30% 70%, #b266ff, #6600ff); }
        .gradient-block:nth-child(4) { background: radial-gradient(circle at 70% 70%, #66cc66, #00aa00); }
        .gradient-block:nth-child(5) { background: radial-gradient(circle at 50% 50%, #ff9933, #ff5500); }

        .glowing-text {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0;
            text-align: center;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0% { color: #00ffff; text-shadow: 0 0 20px #00ffff; }
            33% { color: #ff66b2; text-shadow: 0 0 30px #ff66b2; }
            66% { color: #b266ff; text-shadow: 0 0 40px #b266ff; }
            100% { color: #00ffff; text-shadow: 0 0 20px #00ffff; }
        }

        .neon-button {
            background: transparent;
            border: 3px solid;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            animation: buttonGlow 4s infinite;
            color: white;
        }

        @keyframes buttonGlow {
            0% { border-color: #00ffff; box-shadow: 0 0 30px #00ffff; }
            25% { border-color: #ff66b2; box-shadow: 0 0 40px #ff66b2; }
            50% { border-color: #b266ff; box-shadow: 0 0 50px #b266ff; }
            75% { border-color: #66cc66; box-shadow: 0 0 40px #66cc66; }
            100% { border-color: #00ffff; box-shadow: 0 0 30px #00ffff; }
        }

        .neon-button:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        .gradient-text {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(45deg, 
                #00ffff 0%, #ff66b2 20%, 
                #b266ff 40%, #66cc66 60%, 
                #ff9933 80%, #00ffff 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textWave 8s infinite;
            margin: 40px 0;
        }

        @keyframes textWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ NEON GRADIENTS ✨</h1>
        
        <div class="gradient-text">
            E-GENIUS7 AI
        </div>
        
        <div class="gradient-grid">
            <div class="gradient-card g1">
                <span>🌀</span>
                Cosmic Cyan
            </div>
            <div class="gradient-card g2">
                <span>🌸</span>
                Cherry Pink
            </div>
            <div class="gradient-card g3">
                <span>🔮</span>
                Purple Haze
            </div>
            <div class="gradient-card g4">
                <span>🌿</span>
                Mint Green
            </div>
            <div class="gradient-card g5">
                <span>🔥</span>
                Sunset Orange
            </div>
            <div class="gradient-card g6">
                <span>❤️</span>
                Passion Red
            </div>
            <div class="gradient-card g7">
                <span>💜</span>
                Ultra Violet
            </div>
            <div class="gradient-card g8">
                <span>💚</span>
                Electric Mint
            </div>
            <div class="gradient-card g9">
                <span>🧡</span>
                Neon Amber
            </div>
        </div>

        <div class="gradient-row">
            <div class="gradient-block"></div>
            <div class="gradient-block"></div>
            <div class="gradient-block"></div>
            <div class="gradient-block"></div>
            <div class="gradient-block"></div>
        </div>

        <div class="glowing-text">
            ✦ ПЕРЕЛИВАЮЩИЙСЯ НЕОН ✦
        </div>

        <div style="display: flex; justify-content: center; flex-wrap: wrap;">
            <button class="neon-button" onclick="alert('✨ Neon Cyan ✨')">CYAN</button>
            <button class="neon-button" onclick="alert('🌸 Neon Pink 🌸')">PINK</button>
            <button class="neon-button" onclick="alert('🔮 Neon Purple 🔮')">PURPLE</button>
            <button class="neon-button" onclick="alert('🌿 Neon Green 🌿')">GREEN</button>
        </div>

        <footer>
            ⚡ Каждый элемент переливается разными цветами ⚡
        </footer>
    </div>
</body>
</html>
