<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📁 Google Drive Manager</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f, #1a0b2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(12, 20, 35, 0.95);
            border: 3px solid #00ffff;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px #00ffff;
            backdrop-filter: blur(10px);
            color: white;
        }

        h1 {
            text-align: center;
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffff;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: linear-gradient(145deg, #00cc88, #00aa66);
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ffff;
        }

        .btn.danger {
            background: linear-gradient(145deg, #ff5555, #cc0000);
        }

        .btn.warning {
            background: linear-gradient(145deg, #ffaa00, #ff6600);
        }

        .btn.small {
            padding: 6px 12px;
            font-size: 14px;
        }

        #loginContainer {
            text-align: center;
            padding: 40px;
        }

        #userInfo {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .folder-path {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 15px 0;
            font-family: monospace;
            color: #ff66b2;
        }

        .file-list {
            list-style: none;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #00ffff;
            border-radius: 15px;
            padding: 10px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            transition: all 0.3s;
        }

        .file-item:hover {
            background: rgba(0, 255, 255, 0.1);
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            margin: 15px 0;
            padding: 12px;
            border-radius: 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: white;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .status.success {
            border-color: #00ff00;
            color: #00ff00;
        }

        .status.error {
            border-color: #ff5555;
            color: #ff5555;
        }

        .status.warning {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        .error-details {
            font-size: 12px;
            color: #ff8888;
            margin-top: 5px;
            border-top: 1px solid #ff5555;
            padding-top: 5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ffff;
            border-radius: 15px;
            color: white;
            font-size: 16px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #ff66b2;
            box-shadow: 0 0 20px #ff66b2;
            outline: none;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        select option {
            background: #1a0b2e;
        }

        .danger-zone {
            border: 2px solid #ff5555;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            background: rgba(255, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 Google Drive File Manager</h1>

        <!-- Экран входа -->
        <div id="loginContainer">
            <p style="margin-bottom: 20px; color: #ff66b2;">Для работы необходимо войти в аккаунт Google</p>
            <div id="g_id_onload"
                 data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
                 data-context="use"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-theme="filled_blue"
                 data-size="large"
                 data-text="sign_in_with"
                 data-shape="rectangular"
                 data-logo_alignment="left">
            </div>
        </div>

        <!-- Основной интерфейс (после входа) -->
        <div id="mainContent" class="hidden">
            <div id="userInfo">
                <span>👤 <span id="userEmail"></span></span>
                <button class="btn small" onclick="logout()">🚪 Выйти</button>
            </div>

            <div class="folder-path" id="folderPath"></div>
            <div id="status" class="status">✅ Готов к работе</div>
            <div id="errorDetails" class="error-details hidden"></div>

            <h3>📂 Управление папкой</h3>
            <button class="btn" onclick="getOrCreateFolder()">📁 Создать/получить папку</button>

            <h3>📄 Создать новый файл</h3>
            <input type="text" id="newFileName" placeholder="Имя файла (необязательно)">
            <button class="btn" onclick="createFile()">➕ Создать файл</button>

            <h3>📋 Список файлов</h3>
            <button class="btn small" onclick="listFiles()">🔄 Обновить список</button>
            <div id="fileList" class="file-list"></div>

            <h3>✏️ Редактор файла</h3>
            <select id="fileSelector">
                <option value="">-- Выберите файл --</option>
            </select>
            <textarea id="fileContent" placeholder="Содержимое файла"></textarea>
            <button class="btn" onclick="readFile()">📖 Прочитать</button>
            <button class="btn" onclick="saveFile()">💾 Сохранить</button>
            <button class="btn danger" onclick="deleteFile()">🗑️ Удалить выбранный файл</button>

            <!-- ОПАСНАЯ ЗОНА: УДАЛЕНИЕ ПАПКИ -->
            <div class="danger-zone">
                <h3 style="color: #ff5555;">⚠️ ОПАСНАЯ ЗОНА</h3>
                <p style="color: #ff8888; font-size: 14px;">Удаление папки полностью удалит все файлы пользователя и саму папку.</p>
                <button class="btn danger" onclick="deleteUserFolder()">🔥 ПОЛНОСТЬЮ УДАЛИТЬ ПАПКУ ПОЛЬЗОВАТЕЛЯ</button>
            </div>
        </div>
    </div>

    <script>
        // КОНСТАНТЫ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec';
        let currentUser = null;
        let currentFiles = [];

        // Функция обратного вызова после успешного входа
        function handleCredentialResponse(response) {
            console.log('✅ Вход выполнен, получаем данные...');
            const userInfo = parseJwt(response.credential);
            currentUser = userInfo;
            
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userEmail').textContent = userInfo.email;
            document.getElementById('folderPath').textContent = `📁 Папка: ${userInfo.email}`;
            
            showStatus('✅ Вход выполнен успешно!', 'success');
            // Автоматически создаём/получаем папку
            getOrCreateFolder();
        }

        // Парсинг JWT токена
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) { 
                console.error('Ошибка парсинга JWT', e); 
                return null; 
            }
        }

        // Выход из аккаунта
        function logout() {
            if (google?.accounts?.id) {
                google.accounts.id.disableAutoSelect();
                google.accounts.id.cancel();
            }
            currentUser = null;
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        // Показать статус
        function showStatus(message, type = 'info', errorDetail = null) {
            const status = document.getElementById('status');
            const errorDiv = document.getElementById('errorDetails');
            status.textContent = message;
            status.className = 'status';
            if (type === 'success') status.classList.add('success');
            if (type === 'error') status.classList.add('error');
            if (type === 'warning') status.classList.add('warning');
            if (errorDetail) {
                errorDiv.textContent = '🔍 Детали: ' + JSON.stringify(errorDetail, null, 2);
                errorDiv.classList.remove('hidden');
            } else {
                errorDiv.classList.add('hidden');
            }
        }

        // ПОЛУЧИТЬ/СОЗДАТЬ ПАПКУ
        async function getOrCreateFolder() {
            if (!currentUser) return;
            showStatus('⏳ Создание/получение папки...');
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + encodeURIComponent(currentUser.email));
                const data = await response.json();
                if (data.success) {
                    showStatus('✅ Папка готова!', 'success');
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error', data);
                }
            } catch (e) { 
                showStatus('❌ Ошибка соединения: ' + e.message, 'error', { error: e.toString() }); 
            }
        }

        // ПОЛУЧИТЬ СПИСОК ФАЙЛОВ
        async function listFiles() {
            if (!currentUser) return;
            showStatus('⏳ Загрузка списка файлов...');
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + encodeURIComponent(currentUser.email) + '&action=listChats');
                const data = await response.json();
                
                if (data.success) {
                    currentFiles = data.chats || [];
                    const fileList = document.getElementById('fileList');
                    const selector = document.getElementById('fileSelector');
                    fileList.innerHTML = '';
                    selector.innerHTML = '<option value="">-- Выберите файл --</option>';
                    
                    if (currentFiles.length === 0) {
                        fileList.innerHTML = '<div style="text-align:center; padding:20px;">📂 Файлов пока нет</div>';
                    } else {
                        currentFiles.forEach(file => {
                            const item = document.createElement('div');
                            item.className = 'file-item';
                            item.innerHTML = `
                                <span class="file-name">📄 ${file.name} <small>${new Date(file.lastModified).toLocaleString()}</small></span>
                                <button class="btn small" onclick="selectFile('${file.id}')">📝 Выбрать</button>
                            `;
                            fileList.appendChild(item);
                            
                            const option = document.createElement('option');
                            option.value = file.id;
                            option.textContent = file.name;
                            selector.appendChild(option);
                        });
                    }
                    showStatus(`✅ Найдено файлов: ${currentFiles.length}`, 'success');
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error', data);
                }
            } catch (e) { 
                showStatus('❌ Ошибка соединения: ' + e.message, 'error', { error: e.toString() }); 
            }
        }

        // ВЫБРАТЬ ФАЙЛ
        function selectFile(fileId) {
            const selector = document.getElementById('fileSelector');
            for (let i = 0; i < selector.options.length; i++) {
                if (selector.options[i].value === fileId) {
                    selector.selectedIndex = i;
                    break;
                }
            }
            readFile();
        }

        // СОЗДАТЬ ФАЙЛ
        async function createFile() {
            if (!currentUser) return;
            const fileName = document.getElementById('newFileName').value.trim();
            showStatus('⏳ Создание файла...');
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'createChat',
                        chatName: fileName || null
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showStatus(`✅ Файл создан: ${data.fileName}`, 'success');
                    document.getElementById('newFileName').value = '';
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error', data);
                }
            } catch (e) { 
                showStatus('❌ Ошибка соединения: ' + e.message, 'error', { error: e.toString() }); 
            }
        }

        // ПРОЧИТАТЬ ФАЙЛ
        async function readFile() {
            const selector = document.getElementById('fileSelector');
            const fileId = selector.value;
            if (!fileId) { 
                showStatus('❌ Выберите файл', 'error'); 
                return; 
            }
            showStatus('⏳ Чтение файла...');
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + encodeURIComponent(currentUser.email) + '&action=getChat&fileId=' + fileId);
                const content = await response.text();
                document.getElementById('fileContent').value = content;
                showStatus('✅ Файл прочитан', 'success');
            } catch (e) { 
                showStatus('❌ Ошибка чтения: ' + e.message, 'error', { error: e.toString() }); 
            }
        }

        // СОХРАНИТЬ ФАЙЛ
        async function saveFile() {
            const selector = document.getElementById('fileSelector');
            const fileId = selector.value;
            const content = document.getElementById('fileContent').value;
            if (!fileId) { 
                showStatus('❌ Выберите файл', 'error'); 
                return; 
            }
            showStatus('⏳ Сохранение...');
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'saveChat',
                        fileId: fileId,
                        content: content
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showStatus('✅ Файл сохранён', 'success');
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error', data);
                }
            } catch (e) { 
                showStatus('❌ Ошибка: ' + e.message, 'error', { error: e.toString() }); 
            }
        }

        // УДАЛИТЬ ФАЙЛ (ИСПРАВЛЕНО!)
        async function deleteFile() {
            const selector = document.getElementById('fileSelector');
            const fileId = selector.value;
            
            if (!fileId) { 
                showStatus('❌ Выберите файл', 'error'); 
                return; 
            }
            
            if (!confirm('🗑️ Удалить файл?')) return;
            
            showStatus('⏳ Удаление...');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'deleteChat',
                        fileId: fileId
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Файл удалён', 'success');
                    selector.value = '';
                    document.getElementById('fileContent').value = '';
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error', data);
                }
            } catch (e) { 
                showStatus('❌ Ошибка: ' + e.message, 'error', { error: e.toString() }); 
            }
        }

        // УДАЛИТЬ ВСЮ ПАПКУ ПОЛЬЗОВАТЕЛЯ
        async function deleteUserFolder() {
            if (!currentUser) return;
            if (!confirm('🔥 УДАЛИТЬ ВСЮ ПАПКУ? Это действие необратимо. Все файлы будут удалены.')) return;
            
            const userEmail = currentUser.email;
            const confirmation = prompt(`⚠️ Введите email ${userEmail} для подтверждения удаления ВСЕЙ ПАПКИ:`);
            
            if (confirmation !== userEmail) {
                showStatus('❌ Удаление отменено: email не совпадает', 'error');
                return;
            }

            showStatus('⏳ Удаление папки...', 'warning');
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: userEmail,
                        action: 'deleteUserFolder'
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showStatus('✅ Папка пользователя удалена!', 'success');
                    document.getElementById('fileList').innerHTML = '';
                    document.getElementById('fileSelector').innerHTML = '<option value="">-- Выберите файл --</option>';
                    document.getElementById('fileContent').value = '';
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error', data);
                }
            } catch (e) { 
                showStatus('❌ Ошибка: ' + e.message, 'error', { error: e.toString() }); 
            }
        }
    </script>
</body>
</html>
