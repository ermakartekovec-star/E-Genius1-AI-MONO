<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>📁 Google Drive Тест</title>
    <!-- Подключаем библиотеку Google Identity Services ПРАВИЛЬНО -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="loginContainer" style="text-align: center; margin-top: 50px;">
        <h2>Тест входа через Google</h2>
        <div id="g_id_onload"
             data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="main" style="display: none;">
        <h2>Вы вошли как: <span id="userEmail"></span></h2>
        <button onclick="listFiles()">📁 Показать файлы</button>
        <button onclick="logout()">🚪 Выйти</button>
        <div id="fileList"></div>
    </div>

    <script>
        // Функция вызывается после входа
        function handleCredentialResponse(response) {
            const user = JSON.parse(atob(response.credential.split('.')[1]));
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        }

        // Функция выхода
        function logout() {
            if (google?.accounts?.id) {
                google.accounts.id.cancel();
                google.accounts.id.disableAutoSelect();
            }
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('main').style.display = 'none';
        }

        // Получение списка файлов
        async function listFiles() {
            const userEmail = document.getElementById('userEmail').textContent;
            const response = await fetch('https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec?email=' + userEmail + '&action=listChats');
            const data = await response.json();
            
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<h3>Список файлов:</h3>';
            
            if (data.chats && data.chats.length > 0) {
                data.chats.forEach(file => {
                    fileList.innerHTML += `
                        <div style="border:1px solid #ccc; margin:5px; padding:5px;">
                            📄 ${file.name} (ID: ${file.id})
                            <button onclick="deleteFile('${file.id}')">❌ Удалить</button>
                        </div>
                    `;
                });
            } else {
                fileList.innerHTML += '<p>Файлов пока нет</p>';
            }
        }

        // Удаление файла
        async function deleteFile(fileId) {
            if (!confirm('Удалить файл?')) return;
            
            const userEmail = document.getElementById('userEmail').textContent;
            const response = await fetch('https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec', {
                method: 'POST',
                body: JSON.stringify({
                    email: userEmail,
                    action: 'deleteChat',
                    fileId: fileId
                })
            });
            const result = await response.json();
            
            if (result.success) {
                alert('✅ Файл удалён');
                listFiles(); // обновляем список
            } else {
                alert('❌ Ошибка: ' + JSON.stringify(result));
            }
        }
    </script>
</body>
</html>
