<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Неоновый тест Google Drive</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(12, 20, 35, 0.95);
            border: 3px solid #00ffff;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 30px #00ffff;
            color: white;
        }

        h1 {
            text-align: center;
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ffff;
        }

        h2 {
            color: #ff66b2;
            margin: 20px 0 10px;
            text-shadow: 0 0 10px #ff66b2;
        }

        .neon-box {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 0 15px #00ffff;
        }

        .btn {
            background: linear-gradient(145deg, #00cc88, #00aa66);
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            border: 1px solid gold;
            box-shadow: 0 0 10px #00ffaa;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ffff;
        }

        .btn.danger {
            background: linear-gradient(145deg, #ff5555, #cc0000);
        }

        .file-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px #00ffff;
        }

        #loginContainer {
            text-align: center;
            padding: 30px;
        }

        #userInfo {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff66b2;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            color: #00ffaa;
        }

        .hidden {
            display: none !important;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ffff;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #ff66b2;
            box-shadow: 0 0 20px #ff66b2;
            outline: none;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ffff;
            border-radius: 10px;
            color: white;
            min-height: 100px;
        }

        .badge {
            background: #ff66b2;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ NEON DRIVE ✨</h1>

        <!-- Кнопка входа -->
        <div id="loginContainer">
            <div id="g_id_onload"
                 data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
                 data-context="use"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <!-- Основной интерфейс -->
        <div id="mainContent" class="hidden">
            <div id="userInfo">
                <span>👤 <span id="userEmail"></span></span>
                <button class="btn" onclick="logout()">🚪 Выйти</button>
            </div>

            <div class="status" id="status">✅ Готов к работе</div>

            <div class="neon-box">
                <h2>📁 Управление</h2>
                <button class="btn" onclick="getOrCreateFolder()">📁 Создать/получить папку</button>
                <button class="btn" onclick="createFile()">➕ Создать файл</button>
                <button class="btn" onclick="listFiles()">🔄 Обновить список</button>
            </div>

            <div class="neon-box">
                <h2>📋 Список файлов</h2>
                <div id="fileList"></div>
            </div>

            <div class="neon-box">
                <h2>✏️ Редактор</h2>
                <select id="fileSelector">
                    <option value="">-- Выберите файл --</option>
                </select>
                <textarea id="fileContent" placeholder="Содержимое файла"></textarea>
                <button class="btn" onclick="readFile()">📖 Прочитать</button>
                <button class="btn" onclick="saveFile()">💾 Сохранить</button>
                <button class="btn danger" onclick="deleteFile()">🗑️ Удалить</button>
            </div>

            <div class="neon-box" style="border-color: #ff5555;">
                <h2 style="color: #ff5555;">⚠️ Опасная зона</h2>
                <button class="btn danger" onclick="deleteUserFolder()">🔥 Удалить ВСЮ папку</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec';
        let currentUser = null;
        let currentFiles = [];

        // Вход
        function handleCredentialResponse(response) {
            const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = userInfo;
            
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userEmail').textContent = userInfo.email;
            
            showStatus('✅ Вход выполнен!', 'success');
            getOrCreateFolder();
        }

        // Выход
        function logout() {
            if (google?.accounts?.id) google.accounts.id.disableAutoSelect();
            currentUser = null;
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        function showStatus(msg, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.style.color = type === 'success' ? '#00ff00' : '#ff5555';
        }

        // Получить папку
        async function getOrCreateFolder() {
            showStatus('⏳ Создание папки...');
            try {
                await fetch(SCRIPT_URL + '?email=' + currentUser.email);
                showStatus('✅ Папка готова!', 'success');
                listFiles();
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Список файлов
        async function listFiles() {
            showStatus('⏳ Загрузка...');
            try {
                const r = await fetch(SCRIPT_URL + '?email=' + currentUser.email + '&action=listChats');
                const data = await r.json();
                
                if (data.success) {
                    currentFiles = data.chats || [];
                    const fileList = document.getElementById('fileList');
                    const selector = document.getElementById('fileSelector');
                    
                    fileList.innerHTML = '';
                    selector.innerHTML = '<option value="">-- Выберите файл --</option>';
                    
                    if (currentFiles.length === 0) {
                        fileList.innerHTML = '<div style="padding:20px; text-align:center">📂 Файлов нет</div>';
                    } else {
                        currentFiles.forEach(file => {
                            fileList.innerHTML += `
                                <div class="file-item">
                                    <span>📄 ${file.name}</span>
                                    <button class="btn small" onclick="selectFile('${file.id}')">📝</button>
                                </div>
                            `;
                            selector.innerHTML += `<option value="${file.id}">${file.name}</option>`;
                        });
                    }
                    showStatus(`✅ Найдено файлов: ${currentFiles.length}`, 'success');
                }
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        function selectFile(id) {
            const sel = document.getElementById('fileSelector');
            for(let i = 0; i < sel.options.length; i++) {
                if(sel.options[i].value === id) {
                    sel.selectedIndex = i;
                    break;
                }
            }
            readFile();
        }

        // Создать файл
        async function createFile() {
            showStatus('⏳ Создание...');
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'createChat',
                        chatName: 'файл_' + Date.now()
                    })
                });
                showStatus('✅ Файл создан', 'success');
                listFiles();
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Прочитать файл
        async function readFile() {
            const id = document.getElementById('fileSelector').value;
            if (!id) return showStatus('❌ Выберите файл', 'error');
            
            showStatus('⏳ Чтение...');
            try {
                const r = await fetch(SCRIPT_URL + '?email=' + currentUser.email + '&action=getChat&fileId=' + id);
                const text = await r.text();
                document.getElementById('fileContent').value = text;
                showStatus('✅ Прочитано', 'success');
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Сохранить файл
        async function saveFile() {
            const id = document.getElementById('fileSelector').value;
            const content = document.getElementById('fileContent').value;
            if (!id) return showStatus('❌ Выберите файл', 'error');
            
            showStatus('⏳ Сохранение...');
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'saveChat',
                        fileId: id,
                        content: content
                    })
                });
                showStatus('✅ Сохранено', 'success');
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Удалить файл
        async function deleteFile() {
            const id = document.getElementById('fileSelector').value;
            if (!id) return showStatus('❌ Выберите файл', 'error');
            if (!confirm('Удалить файл?')) return;
            
            showStatus('⏳ Удаление...');
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'deleteChat',
                        fileId: id
                    })
                });
                showStatus('✅ Файл удалён', 'success');
                document.getElementById('fileSelector').value = '';
                document.getElementById('fileContent').value = '';
                listFiles();
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Удалить всю папку
        async function deleteUserFolder() {
            if (!confirm('🔥 УДАЛИТЬ ВСЮ ПАПКУ?')) return;
            if (!confirm('ТОЧНО? ЭТО НЕОБРАТИМО!')) return;
            
            showStatus('⏳ Удаление папки...');
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'deleteUserFolder'
                    })
                });
                showStatus('✅ Папка удалена', 'success');
                listFiles();
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }
    </script>
</body>
</html>
