<!DOCTYPE html>
<html>
<head>
    <title>Ручной тест удаления</title>
</head>
<body>
    <h2>🔑 Вход через Google</h2>
    <!-- Подключаем библиотеку -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <div id="login" style="margin:20px">
        <div id="g_id_onload"
             data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
             data-callback="onSignIn">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="userInfo" style="display:none; margin:20px">
        <p>👤 <span id="userEmail"></span></p>
        <button onclick="getFiles()">📂 Получить список файлов</button>
        <button onclick="signOut()">🚪 Выйти</button>
    </div>

    <div id="files" style="margin:20px; display:none">
        <h3>Список файлов:</h3>
        <ul id="fileList"></ul>
        
        <hr>
        <h3>🗑️ Ручное удаление</h3>
        <input type="text" id="fileIdInput" placeholder="Вставь ID файла" size="50">
        <button onclick="manualDelete()">Удалить этот ID</button>
        <p style="color:#666; font-size:12px">ID можно скопировать из списка выше</p>
        <pre id="result" style="background:#f0f0f0; padding:10px; margin-top:10px"></pre>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec';
        let currentUser = null;

        // При успешном входе
        function onSignIn(response) {
            const user = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('login').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
        }

        // Выход
        function signOut() {
            if (google?.accounts?.id) {
                google.accounts.id.disableAutoSelect();
            }
            currentUser = null;
            document.getElementById('login').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('files').style.display = 'none';
        }

        // Получить список файлов
        async function getFiles() {
            const url = SCRIPT_URL + '?email=' + currentUser.email + '&action=listChats';
            const res = await fetch(url);
            const data = await res.json();
            
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            if (data.chats && data.chats.length > 0) {
                data.chats.forEach(f => {
                    fileList.innerHTML += `<li><b>${f.name}</b> — ID: <code>${f.id}</code></li>`;
                });
                document.getElementById('files').style.display = 'block';
            } else {
                fileList.innerHTML = '<li>Файлов нет</li>';
            }
        }

        // Ручное удаление по введённому ID
        async function manualDelete() {
            const fileId = document.getElementById('fileIdInput').value.trim();
            if (!fileId) {
                document.getElementById('result').textContent = '❌ Введи ID файла';
                return;
            }

            document.getElementById('result').textContent = '⏳ Отправка запроса...';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'deleteChat',
                        fileId: fileId
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('result').textContent = '✅ Файл успешно удалён!';
                    getFiles(); // обновляем список
                    document.getElementById('fileIdInput').value = '';
                } else {
                    document.getElementById('result').textContent = '❌ Ошибка: ' + JSON.stringify(result);
                }
            } catch (e) {
                document.getElementById('result').textContent = '❌ Ошибка сети: ' + e.message;
            }
        }
    </script>
</body>
</html>
