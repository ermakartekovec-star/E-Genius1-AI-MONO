<!DOCTYPE html>
<html>
<head>
    <title>Тест удаления</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="loginContainer"></div>
    <div id="main" style="display:none;">
        <h3>Файлы:</h3>
        <div id="fileList"></div>
        <hr>
        <h3>Ручное удаление</h3>
        <input id="manualFileId" placeholder="Вставь ID файла">
        <button onclick="manualDelete()">🗑️ Удалить</button>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec';
        let currentUser = null;

        // Вход
        google.accounts.id.initialize({
            client_id: '479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com',
            callback: (response) => {
                const user = JSON.parse(atob(response.credential.split('.')[1]));
                currentUser = user;
                document.getElementById('loginContainer').innerHTML = '';
                document.getElementById('main').style.display = 'block';
                loadFiles();
            }
        });

        document.getElementById('loginContainer').innerHTML = '<button onclick="google.accounts.id.prompt()">Войти</button>';

        // Загрузить список файлов
        async function loadFiles() {
            const r = await fetch(SCRIPT_URL + '?email=' + currentUser.email + '&action=listChats');
            const data = await r.json();
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            data.chats.forEach(f => {
                list.innerHTML += `<div>📄 ${f.name} — ID: ${f.id} <button onclick="deleteFile('${f.id}')">❌</button></div>`;
            });
        }

        // Удалить файл
        async function deleteFile(id) {
            if (!confirm('Удалить?')) return;
            const r = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    email: currentUser.email,
                    action: 'deleteChat',
                    fileId: id
                })
            });
            const result = await r.json();
            alert(result.success ? '✅ Удалено' : '❌ Ошибка: ' + JSON.stringify(result));
            loadFiles();
        }

        // Ручное удаление по введённому ID
        async function manualDelete() {
            const id = document.getElementById('manualFileId').value;
            if (!id) return alert('Введи ID');
            deleteFile(id);
        }
    </script>
</body>
</html>
