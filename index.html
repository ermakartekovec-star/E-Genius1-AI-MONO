<!DOCTYPE html>
<html>
<head>
    <title>Тест входа через Google</title>
    <meta charset="UTF-8">
    <!-- Подключаем библиотеку Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: #f0f0f0;
        }
        #userInfo {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: white;
            display: none;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            overflow-x: auto;
        }
        .button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .button:hover {
            background: #3367d6;
        }
        .logout {
            background: #dc3545;
        }
        .logout:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <h1>🔐 Тест входа через Google</h1>
    
    <!-- Контейнер для кнопки входа (будет заменен Google) -->
    <div id="g_id_onload"
         data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    
    <div class="g_id_signin"
         data-type="standard"
         data-theme="filled_blue"
         data-size="large"
         data-text="sign_in_with"
         data-shape="rectangular">
    </div>
    
    <button id="logoutBtn" class="button logout" style="display: none;" onclick="logout()">
        🚪 Выйти
    </button>
    
    <div id="userInfo">
        <h2>✅ Вы успешно вошли!</h2>
        <h3>Информация о пользователе:</h3>
        <pre id="userData"></pre>
    </div>

    <script>
        let currentUser = null;
        
        // Функция, которую вызывает Google после успешного входа
        function handleCredentialResponse(response) {
            console.log('Получен ответ от Google');
            
            // Декодируем JWT токен (он в response.credential)
            const userInfo = parseJwt(response.credential);
            currentUser = userInfo;
            
            console.log('Данные пользователя:', userInfo);
            
            // Показываем информацию о пользователе
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userData').textContent = JSON.stringify(userInfo, null, 2);
            
            // Прячем кнопку входа, показываем кнопку выхода
            document.querySelector('.g_id_signin').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        }
        
        // Функция для декодирования JWT токена
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                console.error('Ошибка парсинга JWT', e);
                return null;
            }
        }
        
        // Функция выхода
        function logout() {
            if (google && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }
            currentUser = null;
            
            // Прячем информацию, показываем кнопку входа
            document.getElementById('userInfo').style.display = 'none';
            document.querySelector('.g_id_signin').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
        }
        
        // Выводим информацию в консоль для отладки
        console.log('Страница загружена, Google Identity Services подключен');
    </script>
</body>
</html>
