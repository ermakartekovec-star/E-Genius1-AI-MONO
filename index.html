<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Неоновый тест с удалением ✨</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(12, 20, 35, 0.95);
            border: 3px solid #00ffff;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 30px #00ffff;
            color: white;
        }

        h1 {
            text-align: center;
            color: #00ffff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ffff;
        }

        h2 {
            color: #ff66b2;
            margin: 20px 0 10px;
            text-shadow: 0 0 10px #ff66b2;
        }

        .neon-box {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 0 15px #00ffff;
        }

        .btn {
            background: linear-gradient(145deg, #00cc88, #00aa66);
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            border: 1px solid gold;
            box-shadow: 0 0 10px #00ffaa;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ffff;
        }

        .btn.danger {
            background: linear-gradient(145deg, #ff5555, #cc0000);
        }

        .file-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-item:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px #00ffff;
        }

        #loginContainer {
            text-align: center;
            padding: 30px;
        }

        #userInfo {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff66b2;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            color: #00ffaa;
            font-family: monospace;
        }

        .log {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff66b2;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            color: #ffaa00;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .hidden {
            display: none !important;
        }

        .badge {
            background: #ff66b2;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ NEON DRIVE ✨</h1>

        <!-- Кнопка входа -->
        <div id="loginContainer">
            <div id="g_id_onload"
                 data-client_id="479159573799-p33s9fqdk7oo95uf7sbpecbsjk0epnvh.apps.googleusercontent.com"
                 data-context="use"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <!-- Основной интерфейс -->
        <div id="mainContent" class="hidden">
            <div id="userInfo">
                <span>👤 <span id="userEmail"></span></span>
                <button class="btn" onclick="logout()">🚪 Выйти</button>
            </div>

            <div class="status" id="status">✅ Готов к работе</div>

            <div class="neon-box">
                <h2>📁 Управление</h2>
                <button class="btn" onclick="getOrCreateFolder()">📁 Создать/получить папку</button>
                <button class="btn" onclick="createFile()">➕ Создать файл</button>
                <button class="btn" onclick="listFiles()">🔄 Обновить список</button>
            </div>

            <div class="neon-box">
                <h2>📋 Список файлов</h2>
                <div id="fileList"></div>
            </div>

            <div class="log" id="log">📝 Лог операций будет здесь</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjqXFOSX5In9RHqwfVUO-wrhwAaO3eg0YYpPJcOQUyUfNf08n3FmsRvUD41E5Xb3gP/exec';
        let currentUser = null;

        // Вход
        function handleCredentialResponse(response) {
            const userInfo = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = userInfo;
            
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userEmail').textContent = userInfo.email;
            
            addLog('✅ Вход выполнен: ' + userInfo.email);
            getOrCreateFolder();
        }

        // Выход
        function logout() {
            if (google?.accounts?.id) google.accounts.id.disableAutoSelect();
            currentUser = null;
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('mainContent').classList.add('hidden');
        }

        function addLog(message) {
            const log = document.getElementById('log');
            log.innerHTML = '📝 ' + new Date().toLocaleTimeString() + ': ' + message + '\n' + log.innerHTML;
        }

        function showStatus(msg, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.style.color = type === 'success' ? '#00ff00' : '#ff5555';
            addLog(msg);
        }

        // Получить папку
        async function getOrCreateFolder() {
            showStatus('⏳ Создание папки...');
            try {
                const response = await fetch(SCRIPT_URL + '?email=' + currentUser.email);
                const data = await response.json();
                if (data.success) {
                    showStatus('✅ Папка готова!', 'success');
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(data), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Список файлов
        async function listFiles() {
            showStatus('⏳ Загрузка списка...');
            try {
                const r = await fetch(SCRIPT_URL + '?email=' + currentUser.email + '&action=listChats');
                const data = await r.json();
                
                if (data.success) {
                    const fileList = document.getElementById('fileList');
                    fileList.innerHTML = '';
                    
                    if (!data.chats || data.chats.length === 0) {
                        fileList.innerHTML = '<div style="padding:20px; text-align:center">📂 Файлов нет</div>';
                        showStatus('✅ Файлов нет', 'success');
                    } else {
                        data.chats.forEach(file => {
                            fileList.innerHTML += `
                                <div class="file-item">
                                    <span>📄 ${file.name}</span>
                                    <div>
                                        <button class="btn" onclick="readFile('${file.id}')">📖</button>
                                        <button class="btn danger" onclick="deleteFile('${file.id}', '${file.name}')">❌</button>
                                    </div>
                                </div>
                            `;
                        });
                        showStatus(`✅ Найдено файлов: ${data.chats.length}`, 'success');
                    }
                }
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Создать файл
        async function createFile() {
            const fileName = 'файл_' + Date.now();
            showStatus('⏳ Создание файла: ' + fileName);
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'createChat',
                        chatName: fileName
                    })
                });
                const result = await response.json();
                if (result.success) {
                    showStatus('✅ Файл создан: ' + fileName, 'success');
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(result), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Прочитать файл
        async function readFile(fileId) {
            showStatus('⏳ Чтение файла ID: ' + fileId);
            try {
                const r = await fetch(SCRIPT_URL + '?email=' + currentUser.email + '&action=getChat&fileId=' + fileId);
                const text = await r.text();
                alert('Содержимое файла:\n' + text);
                showStatus('✅ Файл прочитан', 'success');
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
            }
        }

        // Удалить файл (с ID и логом)
        async function deleteFile(fileId, fileName) {
            if (!confirm(`Удалить файл "${fileName}"?`)) return;
            
            showStatus('⏳ Удаление файла ID: ' + fileId);
            addLog('🗑️ Попытка удаления файла: ' + fileName + ' (ID: ' + fileId + ')');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        email: currentUser.email,
                        action: 'deleteChat',
                        fileId: fileId
                    })
                });
                const result = await response.json();
                
                addLog('📦 Ответ сервера: ' + JSON.stringify(result));
                
                if (result.success) {
                    showStatus('✅ Файл удалён: ' + fileName, 'success');
                    listFiles();
                } else {
                    showStatus('❌ Ошибка: ' + JSON.stringify(result), 'error');
                }
            } catch (e) {
                showStatus('❌ Ошибка: ' + e.message, 'error');
                addLog('❌ Исключение: ' + e.message);
            }
        }
    </script>
</body>
</html>
